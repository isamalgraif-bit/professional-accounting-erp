{% extends "base.html" %}
{% block content %}
<h3 class="mb-4">العملاء</h3>
<div class="form-card mb-4">
<form method="post"><div class="row g-3">
<div class="col-md-3"><label>اسم العميل</label><input class="form-control" name="name" required></div>
<div class="col-md-3"><label>الرقم الضريبي</label><input class="form-control" name="vat_number"></div>
<div class="col-md-2"><label>الجوال</label><input class="form-control" name="phone"></div>
<div class="col-md-2"><label>البريد</label><input class="form-control" name="email"></div>

<div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100">حفظ</button></div>
</div></form>
</div>
<div class="form-card">
<table class="table table-striped"><thead><tr><th>الرقم</th><th>الاسم</th><th>الرقم الضريبي</th><th>الجوال</th><th>البريد</th></tr></thead>
<tbody>{% for r in rows %}<tr><td>{{ r.id }}</td><td>{{ r.name }}</td><td>{{ r.vat_number }}</td><td>{{ r.phone }}</td><td>{{ r.email }}</td></tr>{% endfor %}</tbody></table>
</div>
{% endblock %}
