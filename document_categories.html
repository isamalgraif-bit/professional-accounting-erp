{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>تصنيفات المستندات</h3><small>Document Categories</small></div></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3"><div class="col-md-2"><input class="form-control" name="code" placeholder="الكود" required></div><div class="col-md-4"><input class="form-control" name="name" placeholder="اسم التصنيف" required></div><div class="col-md-2"><input class="form-control" type="number" name="retention_years" value="5"></div><div class="col-md-2 d-flex align-items-center"><label><input type="checkbox" name="requires_expiry"> يتطلب تاريخ انتهاء</label></div><div class="col-md-2"><button class="btn btn-primary w-100">حفظ</button></div></div></form></div>
<div class="form-card"><table class="table table-striped"><tr><th>الكود</th><th>التصنيف</th><th>سنوات الحفظ</th><th>تاريخ انتهاء</th></tr>{% for r in rows %}<tr><td>{{r.code}}</td><td>{{r.name}}</td><td>{{r.retention_years}}</td><td>{{'نعم' if r.requires_expiry else 'لا'}}</td></tr>{% endfor %}</table></div>{% endblock %}
