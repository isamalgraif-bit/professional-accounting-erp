{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>التحليل المالي التنفيذي</h3><small>Financial Analytics</small></div><button class="btn btn-dark" onclick="window.print()">طباعة/PDF</button></div>
<div class="form-card mb-4"><form method="get"><div class="row g-3"><div class="col-md-3"><label>من تاريخ</label><input class="form-control" type="date" name="from_date" value="{{from_date}}"></div><div class="col-md-3"><label>إلى تاريخ</label><input class="form-control" type="date" name="to_date" value="{{to_date}}"></div><div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100">تحديث</button></div></div></form></div>
<div class="form-card"><table class="table table-bordered table-striped"><thead><tr><th>نوع الحساب</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr></thead><tbody>{% for r in rows %}<tr><td>{{r.account_type}}</td><td>{{r.debit}}</td><td>{{r.credit}}</td><th>{{r.balance}}</th></tr>{% endfor %}</tbody></table></div>{% endblock %}
