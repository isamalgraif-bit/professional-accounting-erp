{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>المستودعات</h3><small>Warehouses</small></div><button class="btn btn-outline-primary" data-new-document="1" data-new-url="{{url_for('warehouses')}}">📄 جديد</button></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3"><div class="col-md-3"><label>الكود</label><input class="form-control" name="code" required></div><div class="col-md-5"><label>اسم المستودع</label><input class="form-control" name="name" required></div><div class="col-md-3"><label>الفرع</label><select class="form-select" name="branch_id"><option value="">بدون</option>{% for b in branches %}<option value="{{b.id}}">{{b.name}}</option>{% endfor %}</select></div><div class="col-md-1 d-flex align-items-end"><button class="btn btn-primary">حفظ</button></div></div></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>الكود</th><th>المستودع</th><th>الفرع</th><th>الحالة</th></tr></thead><tbody>{% for w in warehouses %}<tr><td>{{w.code}}</td><td>{{w.name}}</td><td>{{w.branch_name or '-'}}</td><td>{{'نشط' if w.active else 'موقوف'}}</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
