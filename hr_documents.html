{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>مستندات الموظفين</h3><small>Employee Documents</small></div></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3"><div class="col-md-3"><select class="form-select" name="employee_id">{% for e in employees %}<option value="{{e.id}}">{{e.employee_no or ''}} - {{e.name}}</option>{% endfor %}</select></div><div class="col-md-2"><select class="form-select" name="document_type"><option>إقامة</option><option>جواز سفر</option><option>تأمين طبي</option><option>رخصة عمل</option><option>شهادة مهنية</option><option>مستند آخر</option></select></div><div class="col-md-2"><input class="form-control" name="document_no" placeholder="رقم المستند"></div><div class="col-md-2"><input class="form-control" type="date" name="issue_date"></div><div class="col-md-2"><input class="form-control" type="date" name="expiry_date"></div><div class="col-md-1"><button class="btn btn-primary">حفظ</button></div><div class="col-md-6"><input class="form-control" name="file_url" placeholder="رابط الملف"></div><div class="col-md-6"><input class="form-control" name="notes" placeholder="ملاحظات"></div></div></form></div>
<div class="form-card"><table class="table table-striped"><tr><th>الموظف</th><th>النوع</th><th>الرقم</th><th>الإصدار</th><th>الانتهاء</th><th>الرابط</th></tr>{% for d in documents %}<tr><td>{{d.name}}</td><td>{{d.document_type}}</td><td>{{d.document_no}}</td><td>{{d.issue_date or '-'}}</td><td>{{d.expiry_date or '-'}}</td><td>{% if d.file_url %}<a href="{{d.file_url}}" target="_blank">فتح</a>{% endif %}</td></tr>{% endfor %}</table></div>{% endblock %}
