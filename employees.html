{% extends "base.html" %}
{% block content %}
<h3 class="mb-4">الموظفون</h3>
<div class="form-card mb-4"><form method="post"><div class="row g-3">
<div class="col-md-2"><label>رقم الموظف</label><input class="form-control" name="employee_no"></div>
<div class="col-md-3"><label>الاسم</label><input class="form-control" name="name" required></div>
<div class="col-md-2"><label>المسمى الوظيفي</label><input class="form-control" name="job_title"></div>
<div class="col-md-2"><label>الفرع</label><select class="form-select" name="branch_id">{% for b in branches %}<option value="{{b.id}}">{{b.name}}</option>{% endfor %}</select></div>
<div class="col-md-2"><label>الراتب الأساسي</label><input class="form-control" type="number" step="0.01" name="basic_salary"></div>
<div class="col-md-2"><label>البدلات</label><input class="form-control" type="number" step="0.01" name="allowances"></div>
<div class="col-md-2"><button class="btn btn-primary w-100 mt-4">حفظ</button></div>
</div></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>الرقم</th><th>الاسم</th><th>الوظيفة</th><th>الفرع</th><th>الراتب</th><th>البدلات</th></tr></thead>
<tbody>{% for r in rows %}<tr><td>{{r.employee_no}}</td><td>{{r.name}}</td><td>{{r.job_title}}</td><td>{{r.branch_name}}</td><td>{{r.basic_salary}}</td><td>{{r.allowances}}</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
