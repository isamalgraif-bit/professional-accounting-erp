{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>عروض الأسعار</h3><small>Sales Management</small></div><button class="btn btn-outline-primary" data-new-document="1" data-new-url="{{url_for('sales_quotations')}}">📄 جديد</button></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3">
<div class="col-md-2"><label>التاريخ</label><input class="form-control" type="date" name="quotation_date" id="docDate" required></div>
<div class="col-md-2"><label>صالح حتى</label><input class="form-control" type="date" name="valid_until"></div>
<div class="col-md-3"><label>العميل</label><select class="form-select" name="customer_id" required>{% for c in customers %}<option value="{{c.id}}">{{c.name}}{% if c.name_en %} / {{c.name_en}}{% endif %}</option>{% endfor %}</select></div>
<div class="col-md-2"><label>الحالة</label><select class="form-select" name="status"><option>مسودة</option><option>معتمد</option></select></div>

<div class="col-md-3"><label>الفرع</label><select class="form-select" name="branch_id"><option value="">بدون</option>{% for b in branches %}<option value="{{b.id}}">{{b.name}}</option>{% endfor %}</select></div>
<div class="col-md-3"><label>مركز التكلفة</label><select class="form-select" name="cost_center_id"><option value="">بدون</option>{% for c in centers %}<option value="{{c.id}}">{{c.code}} - {{c.name}}</option>{% endfor %}</select></div>
<div class="col-md-6"><label>ملاحظات</label><input class="form-control" name="notes"></div></div>
<div class="table-responsive mt-3"><table class="table table-bordered"><thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>خصم%</th><th>VAT%</th><th></th></tr></thead><tbody id="body"><tr class="line"><td><select class="form-select" name="item_id[]">{% for i in items %}<option value="{{i.id}}">{{i.sku or ''}} - {{i.name}} ({{i.quantity}})</option>{% endfor %}</select></td><td><input class="form-control" type="number" step=".001" name="quantity[]" value="1"></td><td><input class="form-control" type="number" step=".01" name="unit_price[]" value="0"></td><td><input class="form-control" type="number" step=".01" name="discount_rate[]" value="0"></td><td><input class="form-control" type="number" step=".01" name="vat_rate[]" value="15"></td><td><button type="button" class="btn btn-danger remove">×</button></td></tr></tbody></table></div>
<div class="d-flex justify-content-between"><button type="button" class="btn btn-outline-primary" id="add">+ سطر</button><button class="btn btn-primary">💾 حفظ</button></div></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>الرقم</th><th>التاريخ</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th></th></tr></thead><tbody>{% for r in docs %}<tr><td>{{r.quotation_no}}</td><td>{{r.quotation_date}}</td><td>{{r.customer_name}}</td><td>{{r.total}}</td><td>{{r.status}}</td><td><a class="btn btn-sm btn-primary" href="{{url_for('sales_quotation_view',quotation_id=r.id)}}">عرض</a></td></tr>{% endfor %}</tbody></table></div>
<script>docDate.value=new Date().toISOString().slice(0,10);function bind(r){r.querySelector('.remove').onclick=()=>{if(document.querySelectorAll('.line').length>1)r.remove()}}document.querySelectorAll('.line').forEach(bind);add.onclick=()=>{let r=document.querySelector('.line').cloneNode(true);body.appendChild(r);bind(r)}</script>{% endblock %}
