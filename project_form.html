{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>مشروع جديد</h3><small>New Project</small></div></div>
<div class="form-card"><form method="post"><div class="row g-3">
<div class="col-md-4"><label>اسم المشروع</label><input class="form-control" name="name" required></div><div class="col-md-4"><label>Project Name</label><input class="form-control" name="name_en"></div><div class="col-md-4"><label>العميل</label><select class="form-select" name="customer_id"><option value="">بدون</option>{% for c in customers %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select></div>
<div class="col-md-3"><label>الفرع</label><select class="form-select" name="branch_id"><option value="">بدون</option>{% for b in branches %}<option value="{{b.id}}">{{b.name}}</option>{% endfor %}</select></div><div class="col-md-3"><label>مركز التكلفة</label><select class="form-select" name="cost_center_id"><option value="">بدون</option>{% for c in centers %}<option value="{{c.id}}">{{c.code}} - {{c.name}}</option>{% endfor %}</select></div><div class="col-md-3"><label>مدير المشروع</label><input class="form-control" name="project_manager"></div><div class="col-md-3"><label>الموقع</label><input class="form-control" name="location"></div>
<div class="col-md-2"><label>البداية</label><input class="form-control" type="date" name="start_date"></div><div class="col-md-2"><label>النهاية</label><input class="form-control" type="date" name="end_date"></div><div class="col-md-2"><label>قيمة العقد</label><input class="form-control" type="number" step=".01" name="contract_value"></div><div class="col-md-2"><label>الاحتجاز %</label><input class="form-control" type="number" step=".01" name="retention_rate"></div><div class="col-md-2"><label>الدفعة المقدمة %</label><input class="form-control" type="number" step=".01" name="advance_rate"></div><div class="col-md-2"><label>الحالة</label><select class="form-select" name="status"><option>نشط</option><option>معلق</option><option>مكتمل</option></select></div>
<div class="col-12"><label>الوصف</label><textarea class="form-control" name="description"></textarea></div><div class="col-12 text-end"><button class="btn btn-primary">حفظ المشروع</button></div></div></form></div>{% endblock %}
