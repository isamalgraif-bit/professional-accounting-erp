{% extends "base.html" %}
{% block content %}
<h3 class="mb-4">إعدادات الشركة</h3>
<div class="form-card">
<form method="post">
<div class="row g-3">
<div class="col-md-6">
<label>اسم الشركة بالعربية</label>
<input class="form-control" name="company_name_ar" value="{{row.company_name_ar}}" required>
</div>
<div class="col-md-6">
<label>اسم الشركة بالإنجليزية</label>
<input class="form-control" name="company_name_en" value="{{row.company_name_en}}">
</div>
<div class="col-md-4">
<label>الرقم الضريبي</label>
<input class="form-control" name="vat_number" value="{{row.vat_number}}" maxlength="15">
</div>
<div class="col-md-4">
<label>السجل التجاري</label>
<input class="form-control" name="cr_number" value="{{row.cr_number}}">
</div>
<div class="col-md-2">
<label>العملة</label>
<input class="form-control" name="currency" value="{{row.currency}}">
</div>
<div class="col-md-2">
<label>نسبة الضريبة %</label>
<input class="form-control" type="number" step="0.01" name="vat_rate" value="{{row.vat_rate or 15}}">
</div>
<div class="col-md-12">
<label>العنوان</label>
<input class="form-control" name="address" value="{{row.address or ''}}">
</div>
<div class="col-md-4">
<label>الهاتف</label>
<input class="form-control" name="phone" value="{{row.phone or ''}}">
</div>
<div class="col-md-4">
<label>البريد الإلكتروني</label>
<input class="form-control" type="email" name="email" value="{{row.email or ''}}">
</div>
<div class="col-md-4">
<label>رابط شعار الشركة</label>
<input class="form-control" name="logo_url" value="{{row.logo_url or ''}}" placeholder="https://...">
</div>
<div class="col-md-3">
<button class="btn btn-primary w-100">حفظ الإعدادات</button>
</div>
</div>
</form>
</div>
{% endblock %}
