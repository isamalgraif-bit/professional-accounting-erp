{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>أوامر الشراء</h3><small>Purchase Orders</small></div><button class="btn btn-outline-primary" data-new-document="1" data-new-url="{{url_for('purchase_orders')}}">📄 جديد</button></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3">
<div class="col-md-2"><label>التاريخ</label><input class="form-control" type="date" name="po_date" id="poDate" required></div>
<div class="col-md-2"><label>الحالة</label><select class="form-select" name="status"><option>مسودة</option><option>بانتظار الاعتماد</option></select></div>
<div class="col-md-3"><label>طلب الشراء المعتمد</label><select class="form-select" name="requisition_id"><option value="">بدون</option>{% for r in requisitions %}<option value="{{r.id}}">{{r.requisition_no}} - {{r.total_estimated}}</option>{% endfor %}</select></div>
<div class="col-md-3"><label>المورد</label><select class="form-select" name="supplier_id" required>{% for s in suppliers %}<option value="{{s.id}}">{{s.name}}</option>{% endfor %}</select></div>
<div class="col-md-2"><label>المستودع</label><input class="form-control" name="warehouse"></div>
<div class="col-md-3"><label>شروط الدفع</label><input class="form-control" name="payment_terms"></div><div class="col-md-3"><label>شروط التوريد</label><input class="form-control" name="delivery_terms"></div>
<div class="col-md-3"><label>الفرع</label><select class="form-select" name="branch_id"><option value="">بدون</option>{% for b in branches %}<option value="{{b.id}}">{{b.name}}</option>{% endfor %}</select></div><div class="col-md-3"><label>مركز التكلفة</label><select class="form-select" name="cost_center_id"><option value="">بدون</option>{% for c in centers %}<option value="{{c.id}}">{{c.code}} - {{c.name}}</option>{% endfor %}</select></div>
</div><div class="table-responsive mt-3"><table class="table table-bordered"><thead><tr><th>الكود</th><th>الصنف</th><th>الوصف</th><th>الكمية</th><th>الوحدة</th><th>السعر</th><th>VAT%</th><th></th></tr></thead><tbody id="poBody"><tr class="po-row"><td><input class="form-control" name="item_code[]"></td><td><input class="form-control" name="item_name[]" required></td><td><input class="form-control" name="description[]"></td><td><input class="form-control" name="quantity[]" type="number" step=".001" value="1"></td><td><input class="form-control" name="unit[]" value="وحدة"></td><td><input class="form-control" name="unit_price[]" type="number" step=".01" value="0"></td><td><input class="form-control" name="vat_rate[]" type="number" step=".01" value="15"></td><td><button type="button" class="btn btn-danger remove">×</button></td></tr></tbody></table></div><div class="d-flex justify-content-between"><button type="button" class="btn btn-outline-primary" id="addPoRow">+ سطر</button><button class="btn btn-primary">💾 حفظ</button></div></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>الرقم</th><th>التاريخ</th><th>المورد</th><th>الإجمالي</th><th>الحالة</th><th></th></tr></thead><tbody>{% for o in orders %}<tr><td>{{o.po_no}}</td><td>{{o.po_date}}</td><td>{{o.supplier_name}}</td><td>{{o.total}}</td><td>{{o.status}}</td><td><a class="btn btn-sm btn-primary" href="{{url_for('purchase_order_view',po_id=o.id)}}">عرض</a></td></tr>{% endfor %}</tbody></table></div>
<script>poDate.value=new Date().toISOString().slice(0,10);function b(r){r.querySelector('.remove').onclick=()=>{if(document.querySelectorAll('.po-row').length>1)r.remove()}}document.querySelectorAll('.po-row').forEach(b);addPoRow.onclick=()=>{let r=document.querySelector('.po-row').cloneNode(true);r.querySelectorAll('input').forEach(x=>x.value=x.name==='quantity[]'?'1':x.name==='unit[]'?'وحدة':x.name==='vat_rate[]'?'15':'');poBody.appendChild(r);b(r)}</script>
{% endblock %}
