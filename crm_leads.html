{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>العملاء المحتملون</h3><small>Leads</small></div></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3">
<div class="col-md-3"><label>اسم الشركة</label><input class="form-control" name="company_name" required></div><div class="col-md-3"><label>جهة الاتصال</label><input class="form-control" name="contact_name"></div><div class="col-md-2"><label>الهاتف</label><input class="form-control" name="phone"></div><div class="col-md-2"><label>البريد</label><input class="form-control" name="email"></div><div class="col-md-2"><label>المدينة</label><input class="form-control" name="city"></div>
<div class="col-md-2"><label>المصدر</label><select class="form-select" name="source"><option>إحالة</option><option>موقع إلكتروني</option><option>اتصال مباشر</option><option>معرض</option><option>إعلان</option></select></div><div class="col-md-2"><label>القطاع</label><input class="form-control" name="industry"></div><div class="col-md-2"><label>المسؤول</label><input class="form-control" name="assigned_to"></div><div class="col-md-2"><label>الأولوية</label><select class="form-select" name="priority"><option>منخفضة</option><option selected>متوسطة</option><option>عالية</option></select></div><div class="col-md-2"><label>القيمة المتوقعة</label><input class="form-control" type="number" step=".01" name="estimated_value"></div><div class="col-md-1"><label>الاحتمال%</label><input class="form-control" type="number" step=".01" name="probability"></div><div class="col-md-1"><label>الإغلاق</label><input class="form-control" type="date" name="expected_close_date"></div>
<div class="col-12"><label>ملاحظات</label><input class="form-control" name="notes"></div><div class="col-12 text-end"><button class="btn btn-primary">حفظ العميل المحتمل</button></div></div></form></div>
<div class="form-card"><form method="get" class="row g-2 mb-3"><div class="col-md-10"><input class="form-control" name="q" value="{{q}}" placeholder="بحث"></div><div class="col-md-2"><button class="btn btn-outline-primary w-100">بحث</button></div></form><table class="table table-striped"><thead><tr><th>الرقم</th><th>الشركة</th><th>الاتصال</th><th>المصدر</th><th>المسؤول</th><th>الحالة</th><th>القيمة</th><th></th></tr></thead><tbody>{% for l in leads %}<tr><td>{{l.lead_no}}</td><td>{{l.company_name}}</td><td>{{l.contact_name}}<br>{{l.phone}}</td><td>{{l.source}}</td><td>{{l.assigned_to}}</td><td>{{l.status}}</td><td>{{l.estimated_value}}</td><td><a class="btn btn-sm btn-primary" href="{{url_for('crm_lead_view',lead_id=l.id)}}">عرض</a></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
