{% extends "base.html" %}
{% block content %}
<h3 class="mb-4">تغيير كلمة المرور</h3>
<div class="form-card" style="max-width:620px">
<form method="post">
<div class="mb-3">
<label class="form-label">كلمة المرور الحالية</label>
<input class="form-control" type="password" name="current_password" required>
</div>
<div class="mb-3">
<label class="form-label">كلمة المرور الجديدة</label>
<input class="form-control" type="password" name="new_password" minlength="8" required>
<small class="text-muted">8 أحرف على الأقل.</small>
</div>
<div class="mb-3">
<label class="form-label">تأكيد كلمة المرور الجديدة</label>
<input class="form-control" type="password" name="confirm_password" minlength="8" required>
</div>
<button class="btn btn-primary">حفظ كلمة المرور</button>
</form>
</div>
{% endblock %}
