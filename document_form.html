{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>أرشفة مستند جديد</h3><small>New Document</small></div><a class="btn btn-outline-primary" href="{{url_for('document_categories')}}">التصنيفات</a></div>
<div class="form-card"><form method="post"><div class="row g-3"><div class="col-md-5"><label>عنوان المستند</label><input class="form-control" name="title" required></div><div class="col-md-3"><label>التصنيف</label><select class="form-select" name="category_id"><option value="">بدون</option>{% for c in categories %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select></div><div class="col-md-2"><label>الإصدار</label><input class="form-control" name="version_no" value="1.0"></div><div class="col-md-2"><label>السرية</label><select class="form-select" name="confidentiality"><option>عام</option><option selected>داخلي</option><option>سري</option><option>سري جدًا</option></select></div><div class="col-md-2"><label>نوع الارتباط</label><select class="form-select" name="entity_type">{% for e in entity_types %}<option>{{e}}</option>{% endfor %}</select></div><div class="col-md-2"><label>رقم السجل المرتبط</label><input class="form-control" type="number" name="entity_id"></div><div class="col-md-4"><label>اسم الجهة أو السجل</label><input class="form-control" name="entity_name"></div><div class="col-md-2"><label>تاريخ الإصدار</label><input class="form-control" type="date" name="issue_date"></div><div class="col-md-2"><label>تاريخ الانتهاء</label><input class="form-control" type="date" name="expiry_date"></div><div class="col-md-3"><label>اسم الملف</label><input class="form-control" name="file_name"></div><div class="col-md-6"><label>رابط الملف السحابي</label><input class="form-control" name="file_url" placeholder="Google Drive / OneDrive / رابط آمن"></div><div class="col-md-3"><label>الحالة</label><select class="form-select" name="status"><option>ساري</option><option>منتهي</option><option>مؤرشف</option></select></div><div class="col-md-6"><label>الكلمات المفتاحية</label><input class="form-control" name="keywords"></div><div class="col-md-6"><label>ملاحظات</label><input class="form-control" name="notes"></div><div class="col-12 text-end"><button class="btn btn-primary">حفظ وأرشفة</button></div></div></form></div>{% endblock %}
