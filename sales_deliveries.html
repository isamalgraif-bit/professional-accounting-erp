{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>أذونات التسليم</h3><small>Delivery Notes</small></div></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3"><div class="col-md-4"><label>أمر البيع</label><select class="form-select" name="order_id" id="orderSelect" required><option value="">اختر</option>{% for o in orders %}<option value="{{o.id}}">{{o.order_no}} - {{o.customer_name}}</option>{% endfor %}</select></div><div class="col-md-2"><label>التاريخ</label><input class="form-control" type="date" name="delivery_date" id="deliveryDate" required></div><div class="col-md-6"><label>ملاحظات</label><input class="form-control" name="notes"></div></div><div id="itemsArea" class="mt-3"></div><button class="btn btn-primary">حفظ وخصم المخزون</button></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>الرقم</th><th>التاريخ</th><th>أمر البيع</th><th>العميل</th><th></th></tr></thead><tbody>{% for d in docs %}<tr><td>{{d.delivery_no}}</td><td>{{d.delivery_date}}</td><td>{{d.order_no}}</td><td>{{d.customer_name}}</td><td><a class="btn btn-sm btn-primary" href="{{url_for('sales_delivery_view',delivery_id=d.id)}}">عرض</a></td></tr>{% endfor %}</tbody></table></div>
<script>deliveryDate.value=new Date().toISOString().slice(0,10);orderSelect.onchange=async()=>{if(!orderSelect.value){itemsArea.innerHTML='';return}const d=await(await fetch(`/sales/orders/${orderSelect.value}/items`)).json();itemsArea.innerHTML=`<table class="table table-bordered"><thead><tr><th>الصنف</th><th>المطلوب</th><th>المسلم</th><th>تسليم الآن</th></tr></thead><tbody>${d.items.map(x=>`<tr><td>${x.item_name}<input type="hidden" name="order_item_id[]" value="${x.id}"></td><td>${x.quantity}</td><td>${x.delivered_qty}</td><td><input class="form-control" type="number" step=".001" name="delivery_qty[]" value="${Number(x.quantity)-Number(x.delivered_qty)}"></td></tr>`).join('')}</tbody></table>`}</script>{% endblock %}
