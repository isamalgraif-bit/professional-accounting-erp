{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>إنذارات الموظفين</h3><small>Employee Warnings</small></div></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3"><div class="col-md-3"><select class="form-select" name="employee_id">{% for e in employees %}<option value="{{e.id}}">{{e.employee_no or ''}} - {{e.name}}</option>{% endfor %}</select></div><div class="col-md-2"><input class="form-control" type="date" name="warning_date" required></div><div class="col-md-2"><select class="form-select" name="warning_type"><option>تنبيه شفهي</option><option>إنذار كتابي</option><option>إنذار نهائي</option></select></div><div class="col-md-5"><input class="form-control" name="subject" placeholder="الموضوع" required></div><div class="col-md-6"><textarea class="form-control" name="details" placeholder="تفاصيل الإنذار" required></textarea></div><div class="col-md-5"><textarea class="form-control" name="action_required" placeholder="الإجراء المطلوب"></textarea></div><div class="col-md-1"><button class="btn btn-primary">حفظ</button></div></div></form></div>
<div class="form-card"><table class="table table-striped"><tr><th>التاريخ</th><th>الموظف</th><th>النوع</th><th>الموضوع</th><th>الحالة</th></tr>{% for w in warnings %}<tr><td>{{w.warning_date}}</td><td>{{w.name}}</td><td>{{w.warning_type}}</td><td>{{w.subject}}</td><td>{{w.status}}</td></tr>{% endfor %}</table></div>{% endblock %}
