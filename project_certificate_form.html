{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>مستخلص جديد - {{project.name}}</h3><small>Progress Certificate</small></div></div>
<form method="post"><div class="form-card mb-3"><div class="row g-3"><div class="col-md-2"><label>التاريخ</label><input class="form-control" type="date" name="certificate_date" required></div><div class="col-md-2"><label>من</label><input class="form-control" type="date" name="period_from"></div><div class="col-md-2"><label>إلى</label><input class="form-control" type="date" name="period_to"></div><div class="col-md-3"><label>العقد</label><select class="form-select" name="contract_id"><option value="">بدون</option>{% for c in contracts %}<option value="{{c.id}}">{{c.contract_no}}</option>{% endfor %}</select></div><div class="col-md-1"><label>احتجاز%</label><input class="form-control" type="number" step=".01" name="retention_rate" value="{{project.retention_rate}}"></div><div class="col-md-1"><label>استرداد</label><input class="form-control" type="number" step=".01" name="advance_recovery" value="0"></div><div class="col-md-1"><label>خصومات</label><input class="form-control" type="number" step=".01" name="other_deductions" value="0"></div></div></div>
<div class="form-card"><table class="table table-bordered"><thead><tr><th>البند</th><th>الوصف</th><th>كمية العقد</th><th>السابق</th><th>الحالي</th><th>السعر</th></tr></thead><tbody>{% for b in boq %}<tr><td>{{b.item_code}}<input type="hidden" name="boq_item_id[]" value="{{b.id}}"></td><td>{{b.description}}</td><td>{{b.quantity}}</td><td>{{b.cumulative_qty}}</td><td><input class="form-control" type="number" step=".001" min="0" name="current_qty[]" value="0"></td><td>{{b.unit_rate}}</td></tr>{% endfor %}</tbody></table><div class="text-end"><button class="btn btn-primary">حفظ المستخلص</button></div></div></form>{% endblock %}
