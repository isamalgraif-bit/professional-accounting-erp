{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>استلام المواد</h3><small>Goods Receipt Note</small></div></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3"><div class="col-md-3"><label>أمر الشراء</label><select class="form-select" name="po_id" id="poSelect" required><option value="">اختر</option>{% for p in pos %}<option value="{{p.id}}">{{p.po_no}} - {{p.supplier_name}}</option>{% endfor %}</select></div><div class="col-md-2"><label>التاريخ</label><input class="form-control" type="date" name="grn_date" id="grnDate" required></div><div class="col-md-3"><label>المستودع</label><input class="form-control" name="warehouse"></div><div class="col-md-4"><label>ملاحظات</label><input class="form-control" name="notes"></div></div><div id="itemsArea" class="mt-3"></div><button class="btn btn-primary">حفظ الاستلام</button></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>الرقم</th><th>التاريخ</th><th>أمر الشراء</th><th>المورد</th><th></th></tr></thead><tbody>{% for r in receipts %}<tr><td>{{r.grn_no}}</td><td>{{r.grn_date}}</td><td>{{r.po_no}}</td><td>{{r.supplier_name}}</td><td><a class="btn btn-sm btn-primary" href="{{url_for('goods_receipt_view',grn_id=r.id)}}">عرض</a></td></tr>{% endfor %}</tbody></table></div>
<script>grnDate.value=new Date().toISOString().slice(0,10);poSelect.onchange=async()=>{if(!poSelect.value){itemsArea.innerHTML='';return}const d=await (await fetch(`/purchase-orders/${poSelect.value}/open-items`)).json();itemsArea.innerHTML=`<table class="table table-bordered"><thead><tr><th>الصنف</th><th>المطلوب</th><th>المستلم سابقًا</th><th>المستلم الآن</th><th>المقبول</th><th>المرفوض</th><th>ملاحظات</th></tr></thead><tbody>${d.items.map(x=>{let rem=Number(x.quantity)-Number(x.received_qty);return `<tr><td>${x.item_name}<input type="hidden" name="po_item_id[]" value="${x.id}"></td><td>${x.quantity}</td><td>${x.received_qty}</td><td><input class="form-control" type="number" step=".001" max="${rem}" name="received_qty[]" value="${rem}"></td><td><input class="form-control" type="number" step=".001" name="accepted_qty[]" value="${rem}"></td><td><input class="form-control" type="number" step=".001" name="rejected_qty[]" value="0"></td><td><input class="form-control" name="line_notes[]"></td></tr>`}).join('')}</tbody></table>`}</script>
{% endblock %}
