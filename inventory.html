{% extends "base.html" %}
{% block content %}
<h3 class="mb-4">المخزون</h3>
<div class="form-card mb-4"><form method="post"><div class="row g-3">
<div class="col-md-2"><label>رمز الصنف</label><input class="form-control" name="sku"></div>
<div class="col-md-3"><label>اسم الصنف</label><input class="form-control" name="name" required></div>
<div class="col-md-1"><label>الكمية</label><input class="form-control" type="number" step="0.01" name="quantity"></div>
<div class="col-md-1"><label>الوحدة</label><input class="form-control" name="unit" value="وحدة"></div>
<div class="col-md-2"><label>التكلفة</label><input class="form-control" type="number" step="0.01" name="cost"></div>
<div class="col-md-2"><label>سعر البيع</label><input class="form-control" type="number" step="0.01" name="sale_price"></div>
<div class="col-md-2"><label>حد إعادة الطلب</label><input class="form-control" type="number" step="0.01" name="reorder_level"></div>
<div class="col-md-2"><button class="btn btn-primary w-100 mt-4">حفظ</button></div>
</div></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>الرمز</th><th>الصنف</th><th>الكمية</th><th>الوحدة</th><th>التكلفة</th><th>سعر البيع</th></tr></thead>
<tbody>{% for r in rows %}<tr><td>{{r.sku}}</td><td>{{r.name}}</td><td>{{r.quantity}}</td><td>{{r.unit}}</td><td>{{r.cost}}</td><td>{{r.sale_price}}</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
