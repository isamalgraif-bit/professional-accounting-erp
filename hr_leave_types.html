{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>أنواع الإجازات</h3><small>Leave Types</small></div></div>
<div class="form-card mb-4"><form method="post"><div class="row g-3"><div class="col-md-2"><input class="form-control" name="code" placeholder="الكود" required></div><div class="col-md-4"><input class="form-control" name="name" placeholder="اسم الإجازة" required></div><div class="col-md-2"><input class="form-control" type="number" step=".01" name="annual_entitlement" placeholder="الاستحقاق السنوي"></div><div class="col-md-2 d-flex align-items-center"><label><input type="checkbox" name="paid" checked> مدفوعة</label></div><div class="col-md-2"><button class="btn btn-primary w-100">حفظ</button></div></div></form></div>
<div class="form-card"><table class="table table-striped"><tr><th>الكود</th><th>النوع</th><th>مدفوعة</th><th>الاستحقاق</th></tr>{% for r in rows %}<tr><td>{{r.code}}</td><td>{{r.name}}</td><td>{{'نعم' if r.paid else 'لا'}}</td><td>{{r.annual_entitlement}}</td></tr>{% endfor %}</table></div>{% endblock %}
