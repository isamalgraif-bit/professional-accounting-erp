{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>مستخلص مقاول جديد</h3><small>{{contract.contract_no}} - {{contract.subcontractor_name}}</small></div></div>
<form method="post"><div class="form-card mb-3"><div class="row g-3"><div class="col-md-2"><input class="form-control" type="date" name="certificate_date" required></div><div class="col-md-2"><input class="form-control" type="date" name="period_from"></div><div class="col-md-2"><input class="form-control" type="date" name="period_to"></div><div class="col-md-2"><input class="form-control" type="number" step=".01" name="advance_recovery" placeholder="استرداد الدفعة"></div><div class="col-md-2"><input class="form-control" type="number" step=".01" name="other_deductions" placeholder="خصومات أخرى"></div><div class="col-md-2"><input class="form-control" name="notes" placeholder="ملاحظات"></div></div></div>
<div class="form-card"><table class="table table-bordered"><tr><th>البند</th><th>الوصف</th><th>كمية العقد</th><th>السابق</th><th>الحالي</th><th>السعر</th></tr>{% for b in boq %}<tr><td>{{b.item_code}}<input type="hidden" name="boq_item_id[]" value="{{b.id}}"></td><td>{{b.description}}</td><td>{{b.quantity}}</td><td>{{b.cumulative_qty}}</td><td><input class="form-control" type="number" step=".001" min="0" name="current_qty[]" value="0"></td><td>{{b.unit_rate}}</td></tr>{% endfor %}</table><div class="text-end"><button class="btn btn-primary">حفظ المستخلص</button></div></div></form>{% endblock %}
