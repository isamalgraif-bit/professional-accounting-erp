{% extends "base.html" %}
{% block content %}
<h3 class="mb-4">المصروفات</h3>
<div class="form-card mb-4"><form method="post"><div class="row g-3">
<div class="col-md-2"><label>التاريخ</label><input class="form-control" type="date" name="expense_date" required></div>
<div class="col-md-2"><label>التصنيف</label><input class="form-control" name="category" required></div>
<div class="col-md-3"><label>الوصف</label><input class="form-control" name="description"></div>
<div class="col-md-2"><label>المبلغ</label><input class="form-control" type="number" step="0.01" name="amount" required></div>
<div class="col-md-2"><label>الفرع</label><select class="form-select" name="branch_id">{% for b in branches %}<option value="{{b.id}}">{{b.name}}</option>{% endfor %}</select></div>
<div class="col-md-2"><label>خاضع للضريبة</label><select class="form-select" name="taxable"><option value="1">نعم</option><option value="0">لا</option></select></div>
<div class="col-md-2"><button class="btn btn-primary w-100 mt-4">حفظ</button></div>
</div></form></div>
<div class="form-card"><table class="table table-striped"><thead><tr><th>التاريخ</th><th>التصنيف</th><th>الوصف</th><th>المبلغ</th><th>الضريبة</th><th>الإجمالي</th></tr></thead>
<tbody>{% for r in rows %}<tr><td>{{r.expense_date}}</td><td>{{r.category}}</td><td>{{r.description}}</td><td>{{r.amount}}</td><td>{{r.vat}}</td><td>{{r.total}}</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
