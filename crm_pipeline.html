{% extends "base.html" %}{% block content %}
<div class="erp-page-title"><div><h3>خط المبيعات</h3><small>Sales Pipeline</small></div></div>
<div class="d-flex gap-3 overflow-auto">{% for stage in stages %}<div style="min-width:280px;flex:1"><div class="form-card"><h5>{{stage}}</h5>{% for o in data[stage] %}<a class="d-block border rounded p-3 mb-2 text-decoration-none text-dark" href="{{url_for('crm_opportunity_view',opportunity_id=o.id)}}"><b>{{o.title}}</b><div>{{o.customer_name or o.company_name or '-'}}</div><small>{{o.estimated_value}} | {{o.probability}}%</small></a>{% endfor %}</div></div>{% endfor %}</div>{% endblock %}
