{% extends "base.html" %}
{% block content %}
<h3 class="mb-4">تعديل الحساب {{account.account_code}}</h3>
<div class="form-card"><form method="post"><div class="row g-3">
<div class="col-md-2"><label>كود الحساب</label><input class="form-control" name="account_code" value="{{account.account_code}}" required></div>
<div class="col-md-3"><label>اسم الحساب</label><input class="form-control" name="account_name_ar" value="{{account.account_name_ar}}" required></div>
<div class="col-md-3"><label>الاسم الإنجليزي</label><input class="form-control" name="account_name_en" value="{{account.account_name_en or ''}}"></div>
<div class="col-md-2"><label>النوع</label><select class="form-select" name="account_type">{% for t in ['أصل','خصم','حقوق ملكية','إيراد','مصروف'] %}<option {% if account.account_type==t %}selected{% endif %}>{{t}}</option>{% endfor %}</select></div>
<div class="col-md-2"><label>الحساب الأب</label><select class="form-select" name="parent_id"><option value="">حساب رئيسي</option>{% for p in parents %}<option value="{{p.id}}" {% if account.parent_id==p.id %}selected{% endif %}>{{p.account_code}} - {{p.account_name_ar}}</option>{% endfor %}</select></div>
<div class="col-md-2"><label>يقبل حركة</label><select class="form-select" name="accepts_entries"><option value="1" {% if account.accepts_entries %}selected{% endif %}>نعم</option><option value="0" {% if not account.accepts_entries %}selected{% endif %}>لا</option></select></div>
<div class="col-md-2"><label>طبيعة الرصيد</label><select class="form-select" name="normal_balance"><option {% if account.normal_balance=='مدين' %}selected{% endif %}>مدين</option><option {% if account.normal_balance=='دائن' %}selected{% endif %}>دائن</option></select></div>
<div class="col-md-3"><label>القائمة المالية</label><select class="form-select" name="statement_type"><option {% if account.statement_type=='الميزانية العمومية' %}selected{% endif %}>الميزانية العمومية</option><option {% if account.statement_type=='قائمة الدخل' %}selected{% endif %}>قائمة الدخل</option></select></div>
<div class="col-md-2"><label>الحالة</label><select class="form-select" name="active"><option value="1" {% if account.active %}selected{% endif %}>نشط</option><option value="0" {% if not account.active %}selected{% endif %}>غير نشط</option></select></div>
<div class="col-12"><button class="btn btn-primary">حفظ التعديل</button></div>
</div></form></div>
{% endblock %}
